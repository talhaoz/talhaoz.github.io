<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talhaoz Apps</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c1222;
            --card: #131c2e;
            --elev: #192438;
            --brd: #1f2d44;
            --pri: #3b82f6;
            --pri-dim: rgba(59, 130, 246, 0.12);
            --pri-txt: #93c5fd;
            --ink: #eaf0f9;
            --ink2: #8494a7;
            --ink3: #4d5f75;
            --grad: linear-gradient(135deg, #3b82f6, #06b6d4);
        }

        body {
            font-family: 'Manrope', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            top: -10%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08), transparent 70%);
        }
        body::after {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.06), transparent 70%);
        }

        .container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        h1 span {
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 14px;
            color: var(--ink2);
            margin-bottom: 40px;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            margin-bottom: 32px;
        }

        .app {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .app:hover {
            border-color: var(--pri);
            background: var(--elev);
            transform: translateY(-1px);
        }
        .app-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .app-icon.blue { background: var(--grad); }
        .app-icon.green { background: linear-gradient(135deg, #10b981, #34d399); }
        .app-icon.purple { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }

        .app-info { flex: 1; }
        .app-info h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .app-info p {
            font-size: 11px;
            color: var(--ink3);
        }
        .badge {
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 5px;
            background: var(--pri-dim);
            color: var(--pri-txt);
            letter-spacing: 0.5px;
        }
        .badge.live {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        footer {
            font-size: 11px;
            color: var(--ink3);
        }
        footer a {
            color: var(--pri-txt);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">

        <div class="logo">📱</div>

        <h1>Talhaoz <span>Apps</span></h1>
        <p class="tagline">Android uygulamaları</p>

        <div class="app-list">

            <a href="https://play.google.com/store/apps/details?id=com.talhaoz.ykscounter" target="_blank" class="app">
                <div class="app-icon blue">📅</div>
                <div class="app-info">
                    <h3>YKS Sayaç</h3>
                    <p>Sınav geri sayım</p>
                </div>
                <span class="badge live">YAYINDA</span>
            </a>

            <div class="app">
                <div class="app-icon green">🎓</div>
                <div class="app-info">
                    <h3>TercihApp</h3>
                    <p>Tercih robotu</p>
                </div>
                <span class="badge">YAKINDA</span>
            </div>

        </div>

        <footer>
            <a href="/privacy.html">Gizlilik Politikası</a>
        </footer>

    </div>
</body>
</html>
